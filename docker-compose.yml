version: '3.8'

services:
  cosmo-serial:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: cosmo-serial-app
    
    # Restart policy
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8000:8000"  # FastAPI application
    
    # Environment variables from .env file
    env_file:
      - .env
    
    # Additional environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Jakarta
    
    # Serial port access (uncomment and modify as needed)
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0  # Linux
      # For Windows, use COM port mapping in Docker Desktop settings
    
    # Privileged mode for serial port access (if needed)
    # privileged: true
    
    # Volume mounts
    volumes:
      # Mount log directory to persist logs
      - ./Log-Cosmo:/app/Log-Cosmo
      
      # Mount config directory
      - ./Config:/app/Config
      
      # Optional: Mount code for development (hot reload)
      # - .:/app
    
    # Network configuration for NAS and PLC access
    networks:
      - cosmo-network
    
    # Add extra hosts if needed for NAS/PLC by hostname
    extra_hosts:
      - "infinitigroup:172.16.100.183"  # NAS server
      - "plc-host:172.16.100.100"        # PLC server
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Dependencies (if you have database, etc.)
    # depends_on:
    #   - redis
    #   - postgres

networks:
  cosmo-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Optional: Add volumes for persistence
volumes:
  cosmo-logs:
    driver: local
